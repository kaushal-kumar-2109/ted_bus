<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-red-50 via-slate-100 to-red-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
  <div class="max-w-md w-full space-y-8 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-slate-800 text-slate-800 dark:text-slate-200">
    
    <!-- Header/Logo Area -->
    <div class="text-center">
      <img class="mx-auto h-12 w-auto" src="../../../assets/red-bus-with-word-bus-it_600323-482.avif" alt="Redbus Logo">
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">
        {{ lang.text['forgot_password_title'] }}
      </h2>
      <p class="mt-2 text-sm text-gray-600 dark:text-slate-400">
        {{ lang.text['forgot_password_desc'] }}
      </p>
    </div>

    <!-- Alert Messages -->
    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
      <p class="text-sm font-medium text-red-800">{{ errorMessage }}</p>
    </div>

    <div *ngIf="successMessage" class="bg-green-50 border-l-4 border-green-500 p-4 rounded-md">
      <p class="text-sm font-medium text-green-800">{{ successMessage }}</p>
    </div>

    <!-- Form -->
    <form class="mt-8 space-y-6" [formGroup]="forgotForm" (ngSubmit)="onSubmit()">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700 dark:text-slate-300">{{ lang.text['email_address'] }}</label>
        <input id="email" type="email" formControlName="email"
               class="mt-1 appearance-none block w-full px-3 py-3 border border-gray-300 dark:border-slate-700 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm bg-white dark:bg-slate-800 dark:text-white transition-all duration-200"
               [class.border-red-300]="forgotForm.get('email')?.touched && forgotForm.get('email')?.invalid"
               placeholder="you@example.com">
        <span *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['required']" class="text-xs text-red-500 mt-1 block">
          Email is required
        </span>
        <span *ngIf="forgotForm.get('email')?.touched && forgotForm.get('email')?.errors?.['email']" class="text-xs text-red-500 mt-1 block">
          Enter a valid email
        </span>
      </div>

      <!-- Actions -->
      <div class="space-y-3">
        <button type="submit" [disabled]="loading"
                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50 transition-all duration-200 font-semibold shadow-md">
          {{ loading ? lang.text['sending'] : lang.text['send_reset_link'] }}
        </button>

        <div class="text-center">
          <a routerLink="/login" class="text-sm font-medium text-gray-655 dark:text-slate-400 hover:text-red-500 transition-colors duration-200">
            {{ lang.text['back_to_login'] }}
          </a>
        </div>
      </div>

    </form>
  </div>
</div>
