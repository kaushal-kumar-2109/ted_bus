<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-red-50 via-slate-100 to-red-100 dark:from-slate-950 dark:via-slate-900 dark:to-slate-950 py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-200">
  <div class="max-w-md w-full space-y-8 bg-white dark:bg-slate-900 p-8 rounded-2xl shadow-xl border border-gray-100 dark:border-slate-800 transform transition-all duration-300 hover:shadow-2xl text-slate-800 dark:text-slate-200">
    
    <!-- Header/Logo Area -->
    <div class="text-center">
      <img class="mx-auto h-12 w-auto" src="../../../assets/red-bus-with-word-bus-it_600323-482.avif" alt="Redbus Logo">
      <h2 class="mt-6 text-3xl font-extrabold text-gray-900 dark:text-white tracking-tight">
        {{ lang.text['login_title'] }}
      </h2>
      <p class="mt-2 text-sm text-gray-600 dark:text-slate-400">
        {{ lang.text['create_account_prompt'] }}
        <a routerLink="/signup" class="font-medium text-red-600 hover:text-red-500 transition-colors duration-200">
          {{ lang.text['sign_up_here'] }}
        </a>
      </p>
    </div>

    <!-- Alert Message -->
    <div *ngIf="errorMessage" class="bg-red-50 border-l-4 border-red-500 p-4 rounded-md">
      <div class="flex">
        <div class="flex-shrink-0">
          <svg class="h-5 w-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
          </svg>
        </div>
        <div class="ml-3">
          <p class="text-sm font-medium text-red-800">{{ errorMessage }}</p>
        </div>
      </div>
    </div>

    <!-- Form -->
    <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="rounded-md space-y-4">
        <!-- Email Input -->
        <div>
          <label for="email-address" class="block text-sm font-medium text-gray-700 dark:text-slate-300">{{ lang.text['email_address'] }}</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <input id="email-address" name="email" type="email" autocomplete="email" required formControlName="email"
                   class="appearance-none block w-full px-3 py-3 border border-gray-300 dark:border-slate-700 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm bg-white dark:bg-slate-800 dark:text-white transition-all duration-200"
                   [class.border-red-300]="loginForm.get('email')?.touched && loginForm.get('email')?.invalid"
                   placeholder="you@example.com">
          </div>
          <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['required']" class="text-xs text-red-500 mt-1 block">
            Email is required
          </span>
          <span *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.errors?.['email']" class="text-xs text-red-500 mt-1 block">
            Please enter a valid email address
          </span>
        </div>

        <!-- Password Input -->
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 dark:text-slate-300">{{ lang.text['password'] }}</label>
          <div class="mt-1 relative rounded-md shadow-sm">
            <input id="password" name="password" type="password" autocomplete="current-password" required formControlName="password"
                   class="appearance-none block w-full px-3 py-3 border border-gray-300 dark:border-slate-700 rounded-lg placeholder-gray-400 focus:outline-none focus:ring-red-500 focus:border-red-500 sm:text-sm bg-white dark:bg-slate-800 dark:text-white transition-all duration-200"
                   [class.border-red-300]="loginForm.get('password')?.touched && loginForm.get('password')?.invalid"
                   placeholder="••••••••">
          </div>
          <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['required']" class="text-xs text-red-500 mt-1 block">
            Password is required
          </span>
          <span *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.errors?.['minlength']" class="text-xs text-red-500 mt-1 block">
            Password must be at least 6 characters
          </span>
        </div>
      </div>

      <!-- Links Area -->
      <div class="flex items-center justify-between text-sm">
        <div class="flex items-center">
          <input id="remember-me" name="remember-me" type="checkbox"
                 class="h-4 w-4 text-red-600 focus:ring-red-500 border-gray-300 dark:border-slate-700 rounded bg-transparent">
          <label for="remember-me" class="ml-2 block text-gray-900 dark:text-slate-300 select-none">
            Remember me
          </label>
        </div>

        <div class="text-sm">
          <a routerLink="/forgot-password" class="font-medium text-red-600 hover:text-red-500 transition-colors duration-200">
            {{ lang.text['forgot_password'] }}
          </a>
        </div>
      </div>

      <!-- Submit Button -->
      <div>
        <button type="submit" [disabled]="loading"
                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-red-600 hover:bg-red-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 disabled:opacity-50 transition-all duration-200 transform hover:scale-[1.01] active:scale-[0.99] font-semibold tracking-wide shadow-md">
          <span *ngIf="loading" class="absolute left-0 inset-y-0 flex items-center pl-3">
            <svg class="animate-spin h-5 w-5 text-white" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
          </span>
          {{ loading ? lang.text['signing_in'] : lang.text['sign_in'] }}
        </button>
      </div>
    </form>

    <!-- Divider -->
    <div class="relative flex py-2 items-center">
      <div class="flex-grow border-t border-gray-300 dark:border-slate-800"></div>
      <span class="flex-shrink mx-4 text-gray-500 dark:text-slate-400 text-sm">or continue with</span>
      <div class="flex-grow border-t border-gray-300 dark:border-slate-800"></div>
    </div>

    <!-- Google Button Container -->
    <div class="flex justify-center w-full">
      <div id="google-btn-login"></div>
    </div>
  </div>
</div>
